<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mAb Stability — Causal Relationship Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-panel: #1a2035;
  --bg-hover: #243049;
  --border: #2a3550;
  --text-primary: #e8ecf4;
  --text-secondary: #8899b4;
  --text-muted: #556680;
  --accent: #60a5fa;
  --increases: #ef4444;
  --decreases: #3b82f6;
  --leads-to: #a855f7;
  --inhibits: #22c55e;
  --requires: #94a3b8;
  --associated: #475569;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* === LAYOUT === */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

/* === HEADER === */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.header h1 span {
  color: var(--accent);
  font-weight: 700;
}

.header-stats {
  display: flex;
  gap: 20px;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
}

.header-stats .stat-val {
  color: var(--accent);
  font-weight: 500;
}

/* === SIDEBAR === */
.sidebar {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-header {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-body { padding: 12px 14px; }

#relFilters {
  max-height: 45vh;
  overflow-y: auto;
}

#relFilters::-webkit-scrollbar { width: 4px; }
#relFilters::-webkit-scrollbar-track { background: transparent; }
#relFilters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* === RELATIONSHIP FILTERS === */
.rel-filter {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  cursor: pointer;
  transition: opacity 0.2s;
}

.rel-filter:hover { opacity: 0.8; }

.rel-filter input[type="checkbox"] {
  appearance: none;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: all 0.15s;
}

.rel-filter input[type="checkbox"]:checked {
  border-color: var(--accent);
  background: var(--accent);
}

.rel-filter input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  top: -1px;
  left: 2px;
  font-size: 11px;
  color: var(--bg-primary);
  font-weight: 700;
}

.rel-color {
  width: 24px;
  height: 3px;
  border-radius: 2px;
  flex-shrink: 0;
}

.rel-label {
  font-size: 12px;
  color: var(--text-primary);
  flex: 1;
}

.rel-count {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
}

/* === SLIDERS === */
.slider-group {
  padding: 8px 0;
}

.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.slider-label {
  font-size: 12px;
  color: var(--text-secondary);
}

.slider-value {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  background: rgba(96, 165, 250, 0.1);
  padding: 2px 8px;
  border-radius: 4px;
}

input[type="range"] {
  width: 100%;
  height: 4px;
  appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-primary);
  box-shadow: 0 0 8px rgba(96, 165, 250, 0.4);
  cursor: pointer;
}

/* === NODE LEGEND === */
.node-legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.node-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

.node-legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.15);
}

/* === CSV UPLOAD === */
.upload-area {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-area:hover {
  border-color: var(--accent);
  color: var(--text-secondary);
  background: rgba(96, 165, 250, 0.05);
}

.upload-area input { display: none; }

/* === GRAPH AREA === */
.graph-area {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(96,165,250,0.03) 0%, transparent 70%),
    var(--bg-primary);
}

.graph-area svg {
  width: 100%;
  height: 100%;
}

/* === TOOLTIP === */
.tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 12px;
  max-width: 360px;
  box-shadow: var(--shadow);
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.15s;
  line-height: 1.6;
}

.tooltip.visible { opacity: 1; }

.tooltip-title {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.tooltip-row {
  display: flex;
  gap: 8px;
  color: var(--text-secondary);
}

.tooltip-row .label {
  color: var(--text-muted);
  min-width: 55px;
}

.tooltip-rel {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}

/* === EDGE STYLES === */
.link { fill: none; }
.link-associated { stroke-dasharray: 6, 4; }

/* === NODE STYLES === */
.node-circle {
  stroke: rgba(255,255,255,0.2);
  stroke-width: 1.5px;
  cursor: pointer;
  transition: stroke-width 0.15s, filter 0.15s;
  filter: drop-shadow(0 0 4px currentColor);
}

.node-circle:hover {
  stroke: #fff;
  stroke-width: 2.5px;
  filter: drop-shadow(0 0 8px currentColor);
}

.node-label {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 10px;
  fill: var(--text-secondary);
  pointer-events: none;
  text-anchor: middle;
  font-weight: 500;
}

/* === EMPTY STATE === */
.empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <h1><span>mAb Stability</span> — Causal Relationship Network</h1>
    <div class="header-stats">
      <span>Nodes <span class="stat-val" id="stat-nodes">0</span></span>
      <span>Edges <span class="stat-val" id="stat-edges">0</span></span>
      <span>Papers <span class="stat-val" id="stat-papers">0</span></span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- CSV Upload -->
    <div class="panel">
      <div class="panel-header">📂 데이터</div>
      <div class="panel-body">
        <div class="upload-area" id="uploadArea">
          <input type="file" id="csvInput" accept=".csv">
          <span id="uploadLabel">⏳ 레포 CSV 로딩 중...</span>
        </div>
      </div>
    </div>

    <!-- Relationship Type Filters -->
    <div class="panel">
      <div class="panel-header">⚡ 관계 유형</div>
      <div class="panel-body" id="relFilters"></div>
    </div>

    <!-- Frequency / Papers Sliders -->
    <div class="panel">
      <div class="panel-header">🎚 필터</div>
      <div class="panel-body">
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">최소 빈도</span>
            <span class="slider-value" id="freqValue">≥ 3</span>
          </div>
          <input type="range" id="freqSlider" min="1" max="20" value="3">
        </div>
        <div class="slider-group">
          <div class="slider-header">
            <span class="slider-label">최소 논문 수</span>
            <span class="slider-value" id="paperValue">≥ 3</span>
          </div>
          <input type="range" id="paperSlider" min="1" max="20" value="3">
        </div>
      </div>
    </div>

    <!-- Node Legend -->
    <div class="panel">
      <div class="panel-header">🔵 노드 카테고리</div>
      <div class="panel-body">
        <div class="node-legend">
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#c4b5fd"></div>
            <span>서열</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#a78bfa"></div>
            <span>구조</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#34d399"></div>
            <span>제형</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#fbbf24"></div>
            <span>스트레스</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#f87171"></div>
            <span>안정성</span>
          </div>
          <div class="node-legend-item">
            <div class="node-legend-dot" style="background:#fb923c"></div>
            <span>품질 결과</span>
          </div>
          <div class="node-legend-item" style="margin-top:4px; padding-top:8px; border-top:1px solid var(--border);">
            <span style="color:var(--text-muted); font-size:11px;">노드 크기 = 총 언급 빈도 · 화살표 굵기 = 빈도</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Focus Panel -->
    <div class="panel" id="focusPanel" style="display:none;">
      <div class="panel-header">🎯 선택된 노드</div>
      <div class="panel-body" id="focusInfo" style="max-height:40vh; overflow-y:auto;"></div>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="graph-area" id="graphArea">
    <svg id="graphSvg"></svg>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const REL_CONFIG = {
  // Group A: 범용 인과 (9개) — 빨강/파랑/보라 계열
  stabilizes:    { color: '#10b981', label: '안정화 (stabilizes)',      symbol: '⊕', group: 'A' },
  destabilizes:  { color: '#ef4444', label: '불안정화 (destabilizes)',   symbol: '⊖', group: 'A' },
  increases:     { color: '#f97316', label: '증가 (increases)',         symbol: '↑', group: 'A' },
  decreases:     { color: '#3b82f6', label: '감소 (decreases)',         symbol: '↓', group: 'A' },
  inhibits:      { color: '#06b6d4', label: '억제 (inhibits)',          symbol: '⊣', group: 'A' },
  promotes:      { color: '#e11d48', label: '촉진 (promotes)',          symbol: '»', group: 'A' },
  induces:       { color: '#dc2626', label: '유발 (induces)',           symbol: '⇒', group: 'A' },
  prevents:      { color: '#0ea5e9', label: '차단 (prevents)',          symbol: '⊘', group: 'A' },
  requires:      { color: '#8b5cf6', label: '필요 (requires)',          symbol: '⊂', group: 'A' },
  // Group B: 구조/결합 (3개) — 청록 계열
  modifies:      { color: '#14b8a6', label: '구조변형 (modifies)',       symbol: '~>', group: 'B' },
  binds:         { color: '#2dd4bf', label: '결합 (binds)',             symbol: '⊷',  group: 'B' },
  shields:       { color: '#5eead4', label: '차폐 (shields)',           symbol: '▷',  group: 'B' },
  // Group C: 분해 메커니즘 (9개) — 주황/갈색/진한 계열
  aggregates:    { color: '#b91c1c', label: '응집 (aggregates)',        symbol: 'Ag', group: 'C' },
  oxidizes:      { color: '#c2410c', label: '산화 (oxidizes)',          symbol: 'Ox', group: 'C' },
  deamidates:    { color: '#a16207', label: '탈아미드화 (deamidates)',    symbol: 'Da', group: 'C' },
  isomerizes:    { color: '#92400e', label: '이성질화 (isomerizes)',      symbol: 'Is', group: 'C' },
  fragments:     { color: '#9f1239', label: '단편화 (fragments)',        symbol: '✂',  group: 'C' },
  unfolds:       { color: '#7e22ce', label: '언폴딩 (unfolds)',          symbol: 'Un', group: 'C' },
  adsorbs:       { color: '#6d28d9', label: '흡착 (adsorbs)',           symbol: 'Ad', group: 'C' },
  precipitates:  { color: '#4338ca', label: '침전 (precipitates)',       symbol: 'Pp', group: 'C' },
  degrades:      { color: '#78350f', label: '분해 (degrades)',          symbol: 'Dg', group: 'C' },
  // Group D: 무방향 (1개)
  correlates:    { color: '#475569', label: '상관관계 (correlates)',      symbol: '~',  group: 'D' },
};

const REL_GROUPS = {
  A: { label: '범용 인과', count: 9 },
  B: { label: '구조/결합', count: 3 },
  C: { label: '분해 메커니즘', count: 9 },
  D: { label: '무방향', count: 1 },
};

// 6개 카테고리
const CATEGORY_COLORS = {
  sequence:        '#c4b5fd',
  structure:       '#a78bfa',
  formulation:     '#34d399',
  stress:          '#fbbf24',
  stability:       '#f87171',
  quality_outcome: '#fb923c',
};
const DEFAULT_CATEGORY = 'stability';

// v3 CSV 호환 매핑
const STRUCTURE_KW = ['domain','fab','fc ','fc-','hinge','patch','hydrophobic','charge patch','disulfide','conformation','folding','tertiary','quaternary','beta-sheet','loop','framework','glycan shield'];
const QUALITY_KW = ['charge variant','particle formation','particle count','immunogenicity','viscosity','high viscosity','turbidity','potency','hmw','sec monomer','monomer %','subvisible','efficacy','safety','toxicity','cytotoxicity','sensitivity','opalescence','bioactivity','binding affinity','quality outcome','thermal denaturation'];

function mapCategory(oldCat, name) {
  if (CATEGORY_COLORS[oldCat]) return oldCat;
  const lower = (name || '').toLowerCase();
  if (oldCat === 'sequence_structure') {
    if (STRUCTURE_KW.some(k => lower.includes(k))) return 'structure';
    return 'sequence';
  }
  if (oldCat === 'formulation_factor') return 'formulation';
  if (oldCat === 'stress_condition') return 'stress';
  if (oldCat === 'stability_property' || oldCat === 'degradation' || oldCat === 'degradation_pathway') return 'stability';
  if (QUALITY_KW.some(k => lower.includes(k))) return 'quality_outcome';
  return 'stability';
}

// SAMPLE DATA (Step 2가 없어도 바로 데모 가능)
// ============================================================

  // --- Group C: 분해 메커니즘 ---
  {cause:"thermal stress",effect:"mAb",relationship:"aggregates",frequency:28,num_papers:22,main_confidence:"high",sample_evidence:"Thermal stress at 40C accelerates mAb aggregate formation"},
  {cause:"light exposure",effect:"Trp residues",relationship:"oxidizes",frequency:10,num_papers:7,main_confidence:"high",sample_evidence:"UV light exposure oxidizes tryptophan residues in mAb"},
  {cause:"alkaline pH",effect:"Asn residues",relationship:"deamidates",frequency:12,num_papers:9,main_confidence:"high",sample_evidence:"pH above 7 promotes deamidation of asparagine residues"},

  {cause:"glycosylation pattern",effect:"Tm",relationship:"correlates",frequency:7,num_papers:5,main_confidence:"medium",sample_evidence:"Glycan composition correlates with thermal melting temperature"},
  // --- 추가 체인 관계들 ---
  {cause:"aggregation",effect:"immunogenicity risk",relationship:"increases",frequency:22,num_papers:18,main_confidence:"high",sample_evidence:"Protein aggregates increase risk of unwanted immune response"},
  {cause:"subvisible particles",effect:"immunogenicity risk",relationship:"increases",frequency:11,num_papers:9,main_confidence:"medium",sample_evidence:"Subvisible particles may act as adjuvants triggering immune response"},

// ============================================================
// BUILD FILTERS UI

function buildRelFilters() {
  const container = document.getElementById('relFilters');
  const counts = {};
  rawData.forEach(d => { counts[d.relationship] = (counts[d.relationship] || 0) + 1; });

  container.innerHTML = '';
  let currentGroup = '';

  Object.entries(REL_CONFIG).forEach(([key, cfg]) => {
    // Group header
    if (cfg.group !== currentGroup) {
      currentGroup = cfg.group;
      const groupInfo = REL_GROUPS[currentGroup];
      const header = document.createElement('div');
      header.style.cssText = 'font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); padding:8px 0 4px; margin-top:6px; border-top:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; align-items:center;';
      if (currentGroup === 'A') header.style.borderTop = 'none';
      header.innerHTML = `<span>${currentGroup}. ${groupInfo.label}</span><span style="font-size:9px; color:var(--accent); font-family:JetBrains Mono,monospace;">전체</span>`;
      header.addEventListener('click', () => {
        const groupRels = Object.entries(REL_CONFIG).filter(([,v]) => v.group === currentGroup).map(([k]) => k);
        const allOn = groupRels.every(r => activeRels.has(r));
        groupRels.forEach(r => { if (allOn) activeRels.delete(r); else activeRels.add(r); });
        buildRelFilters();
        updateGraph();
      });
      container.appendChild(header);
    }

    const count = counts[key] || 0;
    const div = document.createElement('label');
    div.className = 'rel-filter';
    const isDashed = key === 'correlates';
    div.innerHTML = `
      <input type="checkbox" data-rel="${key}" ${activeRels.has(key) ? 'checked' : ''}>
      <div class="rel-color" style="background:${isDashed ? `repeating-linear-gradient(90deg,${cfg.color} 0,${cfg.color} 4px,transparent 4px,transparent 7px)` : cfg.color}"></div>
      <span class="rel-label">${cfg.label}</span>
      <span class="rel-count">${count}</span>
    `;
    div.querySelector('input').addEventListener('change', (e) => {
      if (e.target.checked) activeRels.add(key);
      else activeRels.delete(key);
      updateGraph();
    });
    container.appendChild(div);
  });
}

document.getElementById('csvInput').addEventListener('change', (e) => {

    // Update slider max values

  };
  reader.readAsText(file);
});

function parseCSV(text) {
  text = text.replace(/^\ufeff/, '');  // BOM 제거
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map(line => {
    // Handle quoted fields with commas
    const values = [];
    let current = '';
    let inQuotes = false;
    for (const char of line) {
      if (char === '"') { inQuotes = !inQuotes; }
      else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
      else { current += char; }
    }
    values.push(current.trim());

    const obj = {};
    headers.forEach((h, i) => { obj[h] = values[i] || ''; });
    obj.frequency = parseInt(obj.frequency) || 1;
    obj.num_papers = parseInt(obj.num_papers) || 1;
    return obj;
  }).filter(d => d.cause && d.effect);
}

// ============================================================
// GRAPH UPDATE
// ============================================================
function updateGraph() {
  // Filter data
  const filtered = rawData.filter(d =>
    activeRels.has(d.relationship) &&
    d.frequency >= minFreq &&
    d.num_papers >= minPapers
  );

  // Build nodes and links
  const nodeMap = new Map();
  const nodeCatCounts = {};
  const links = [];

  filtered.forEach(d => {
    if (!nodeMap.has(d.cause)) nodeMap.set(d.cause, { id: d.cause, inW: 0, outW: 0, total: 0 });
    if (!nodeMap.has(d.effect)) nodeMap.set(d.effect, { id: d.effect, inW: 0, outW: 0, total: 0 });

    nodeMap.get(d.cause).outW += d.frequency;
    nodeMap.get(d.cause).total += d.frequency;
    nodeMap.get(d.effect).inW += d.frequency;
    nodeMap.get(d.effect).total += d.frequency;

    // 카테고리 추적
    if (d.category_cause) {
      const mc = mapCategory(d.category_cause, d.cause);
      if (!nodeCatCounts[d.cause]) nodeCatCounts[d.cause] = {};
      nodeCatCounts[d.cause][mc] = (nodeCatCounts[d.cause][mc] || 0) + 1;
    }
    if (d.category_effect) {
      const mc = mapCategory(d.category_effect, d.effect);
      if (!nodeCatCounts[d.effect]) nodeCatCounts[d.effect] = {};
      nodeCatCounts[d.effect][mc] = (nodeCatCounts[d.effect][mc] || 0) + 1;
    }

    links.push({
      source: d.cause,
      target: d.effect,
      relationship: d.relationship,
      frequency: d.frequency,
      num_papers: d.num_papers,
      confidence: d.main_confidence || 'medium',
      evidence: d.sample_evidence || '',
    });
  });

  const nodes = Array.from(nodeMap.values());
  // 각 노드에 카테고리 배정 (최다 빈도, 없으면 키워드 기반 추정)
  const SEQ_KW = ['residue','cdr','mutation','variant','glycosylation site','asn','asp','met','trp','sequence','vh','vl','vhh','scfv','nanobod','amino acid'];
  const STR_KW = ['domain','fab','fc ','fc-','hinge','patch','hydrophobic','charge patch','disulfide','conformation','folding','unfolding','glycan shield','loop','framework'];
  const FORM_KW = ['polysorbate','sucrose','trehalose','arginine','histidine','buffer','ph','concentration','nacl','mannitol','excipient','surfactant','lyophiliz','formulation'];
  const STRESS_KW = ['thermal','agitation','light exposure','freeze-thaw','storage','mechanical stress','humidity','uv','shaking','temperature','stress'];
  function guessCategory(name) {
    const l = name.toLowerCase();
    if (SEQ_KW.some(k => l.includes(k))) return 'sequence';
    if (STR_KW.some(k => l.includes(k))) return 'structure';
    if (FORM_KW.some(k => l.includes(k))) return 'formulation';
    if (STRESS_KW.some(k => l.includes(k))) return 'stress';
    return 'stability';
  }
  nodes.forEach(n => {
    const counts = nodeCatCounts[n.id];
    if (counts && Object.keys(counts).length > 0) {
      n.category = Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
    } else {
      n.category = guessCategory(n.id);
    }
  });

  // Update stats
  const allPapers = new Set();
  filtered.forEach(d => {
    if (d.pmid_list) d.pmid_list.split(';').forEach(p => allPapers.add(p));
    else allPapers.add(`${d.cause}-${d.effect}`);
  });
  document.getElementById('stat-nodes').textContent = nodes.length;
  document.getElementById('stat-edges').textContent = links.length;
  document.getElementById('stat-papers').textContent = allPapers.size;

  // Scales
  const maxFreq = Math.max(...links.map(l => l.frequency), 1);
  const maxTotal = Math.max(...nodes.map(n => n.total), 1);
  const rScale = d3.scaleSqrt().domain([1, maxTotal]).range([6, 30]);
  const wScale = d3.scaleLinear().domain([1, maxFreq]).range([1, 7]);
  // 각 노드에 반지름 저장
  nodes.forEach(n => { n.r = rScale(n.total); });

  // 링크 경로: 노드 가장자리에서 시작/끝 (화살표가 노드에 가려지지 않도록)
  function linkPath(d) {
    const sx = d.source.x, sy = d.source.y;
    const tx = d.target.x, ty = d.target.y;
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const sr = d.source.r || 6, tr = d.target.r || 6;
    const x1 = sx + (dx / dist) * sr;
    const y1 = sy + (dy / dist) * sr;
    const x2 = tx - (dx / dist) * tr;
    const y2 = ty - (dy / dist) * tr;
    const dr = dist * 1.5;
    return `M${x1},${y1}A${dr},${dr} 0 0,1 ${x2},${y2}`;
  }

  // Clear
  zoomGroup.selectAll('*').remove();

  if (nodes.length === 0) {
    zoomGroup.append('text')
      .attr('x', width / 2).attr('y', height / 2)
      .attr('text-anchor', 'middle')
      .attr('fill', '#556680')
      .attr('font-size', 14)
      .text('필터 조건에 맞는 데이터가 없습니다. 조건을 완화해보세요.');
    return;
  }

  // 레이아웃 계산 (시뮬레이션 없이, 위치만 계산)
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => rScale(d.total) + 10))
    .stop();
  for (let i = 0; i < 300; i++) simulation.tick();
  simulation = null; // 시뮬레이션 완전 해제

  // Links
  const link = zoomGroup.append('g')
    .selectAll('path')
    .data(links)
    .join('path')
    .attr('class', d => `link ${d.relationship === 'correlates' ? 'link-associated' : ''}`)
    .attr('stroke', d => REL_CONFIG[d.relationship]?.color || '#475569')
    .attr('stroke-width', d => wScale(d.frequency))
    .attr('stroke-opacity', 0.6)
    .attr('marker-end', d => `url(#arrow-${d.relationship})`)
    .attr('d', d => linkPath(d))
    .on('mouseover', (event, d) => showEdgeTooltip(event, d))
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout', hideTooltip);

  // Nodes
  const node = zoomGroup.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .call(d3.drag()
      .on('drag', (event, d) => {
        d.x = event.x; d.y = event.y;
        d3.select(event.sourceEvent.target.parentNode)
          .attr('transform', `translate(${d.x},${d.y})`);
        link.attr('d', l => linkPath(l));
      }));

  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => rScale(d.total))
    .attr('fill', d => CATEGORY_COLORS[d.category] || CATEGORY_COLORS[DEFAULT_CATEGORY])
    .attr('fill-opacity', 0.85)
    .on('mouseover', (event, d) => showNodeTooltip(event, d))
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout', hideTooltip)
    .on('click', (event, d) => {
      event.stopPropagation();
      if (focusedNode === d.id) { clearFocus(); } else { focusedNode = d.id; applyFocus(); }
    });

  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => rScale(d.total) + 14)
    .text(d => d.id.length > 25 ? d.id.slice(0, 23) + '…' : d.id);

  // Store references for focus mode
  lastNodeSel = node;
  lastLinkSel = link;
  lastNodes = nodes;
  lastLinks = links;
  if (focusedNode) applyFocus();
}

// ============================================================
// FOCUS MODE
// ============================================================
function applyFocus() {
  if (!focusedNode || !lastNodeSel || !lastLinkSel) return;
  const connected = new Set([focusedNode]);
  const inLinks = [], outLinks = [];
  lastLinks.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (tid === focusedNode) { connected.add(sid); inLinks.push(l); }
    if (sid === focusedNode) { connected.add(tid); outLinks.push(l); }
  });

  lastNodeSel.select('circle')
    .attr('fill-opacity', d => connected.has(d.id) ? 0.95 : 0.05)
    .attr('stroke', d => d.id === focusedNode ? '#fff' : 'rgba(255,255,255,0.15)')
    .attr('stroke-width', d => d.id === focusedNode ? 3 : 1.5);
  lastNodeSel.select('text')
    .attr('fill-opacity', d => connected.has(d.id) ? 1 : 0.05);

  const inSet = new Set(inLinks.map(l => (l.source.id||l.source) + '>' + (l.target.id||l.target)));
  const outSet = new Set(outLinks.map(l => (l.source.id||l.source) + '>' + (l.target.id||l.target)));

  lastLinkSel
    .attr('stroke-opacity', d => {
      const key = (d.source.id||d.source) + '>' + (d.target.id||d.target);
      return (inSet.has(key) || outSet.has(key)) ? 0.85 : 0;
    })
    .attr('stroke', d => {
      const key = (d.source.id||d.source) + '>' + (d.target.id||d.target);
      if (inSet.has(key)) return '#38bdf8';
      if (outSet.has(key)) return '#fb923c';
      return 'none';
    })
    .attr('stroke-width', d => {
      const key = (d.source.id||d.source) + '>' + (d.target.id||d.target);
      return (inSet.has(key) || outSet.has(key)) ? 2.5 : 0;
    })
    .attr('marker-end', d => {
      const key = (d.source.id||d.source) + '>' + (d.target.id||d.target);
      if (inSet.has(key)) return 'url(#arrow-focus-in)';
      if (outSet.has(key)) return 'url(#arrow-focus-out)';
      return 'none';
    });

  // Info panel
  const panel = document.getElementById('focusPanel');
  const info = document.getElementById('focusInfo');
  panel.style.display = 'block';
  const catLabels = { sequence:'서열', structure:'구조', formulation:'제형', stress:'스트레스', stability:'안정성', quality_outcome:'품질 결과' };
  const nd = lastNodes.find(n => n.id === focusedNode);
  const catLabel = catLabels[nd?.category] || nd?.category || '';
  const catColor = CATEGORY_COLORS[nd?.category] || '#888';
  info.innerHTML = `
    <div style="font-weight:600; font-size:13px; margin-bottom:6px;">${focusedNode}</div>
    <div style="font-size:11px; color:${catColor}; margin-bottom:8px;">${catLabel}</div>
    ${inLinks.length > 0 ? `<div style="font-size:10px; color:#38bdf8; margin-bottom:4px; font-weight:600;">← 원인 (${inLinks.length})</div>` +
      inLinks.sort((a,b) => b.frequency - a.frequency).slice(0, 15).map(l => {
        const cfg = REL_CONFIG[l.relationship] || {};
        const src = typeof l.source === 'object' ? l.source.id : l.source;
        return `<div style="font-size:11px; margin:2px 0; padding:3px 6px; border-radius:3px; background:var(--bg-primary);">${src} <span style="color:#38bdf8; font-size:10px;">${l.relationship}</span> <span style="color:var(--text-muted);">(${l.frequency})</span></div>`;
      }).join('') : ''}
    ${outLinks.length > 0 ? `<div style="font-size:10px; color:#fb923c; margin-top:8px; margin-bottom:4px; font-weight:600;">→ 결과 (${outLinks.length})</div>` +
      outLinks.sort((a,b) => b.frequency - a.frequency).slice(0, 15).map(l => {
        const cfg = REL_CONFIG[l.relationship] || {};
        const tgt = typeof l.target === 'object' ? l.target.id : l.target;
        return `<div style="font-size:11px; margin:2px 0; padding:3px 6px; border-radius:3px; background:var(--bg-primary);"><span style="color:#fb923c; font-size:10px;">${l.relationship}</span> ${tgt} <span style="color:var(--text-muted);">(${l.frequency})</span></div>`;
      }).join('') : ''}
    <div style="margin-top:8px; font-size:10px; color:var(--text-muted); cursor:pointer; text-decoration:underline;" onclick="clearFocus()">포커스 해제</div>
  `;
}

function clearFocus() {
  focusedNode = null;
  if (lastNodeSel) {
    lastNodeSel.select('circle').attr('fill-opacity', 0.85).attr('stroke', 'rgba(255,255,255,0.2)').attr('stroke-width', 1.5);
    lastNodeSel.select('text').attr('fill-opacity', 1);
  }
  if (lastLinkSel) {
    lastLinkSel
      .attr('stroke-opacity', 0.6)
      .attr('stroke', d => REL_CONFIG[d.relationship]?.color || '#475569')
      .attr('stroke-width', d => {
        const maxF = Math.max(...lastLinks.map(l => l.frequency), 1);
        return d3.scaleLinear().domain([1, maxF]).range([1, 7])(d.frequency);
      })
      .attr('marker-end', d => `url(#arrow-${d.relationship})`);
  }
  document.getElementById('focusPanel').style.display = 'none';
}

// Click on background to clear focus
svg.on('click', () => clearFocus());

function showNodeTooltip(event, d) {
  const catLabels = { sequence:'서열', structure:'구조', formulation:'제형', stress:'스트레스', stability:'안정성', quality_outcome:'품질 결과' };
  const catLabel = catLabels[d.category] || d.category || '미분류';
  const catColor = CATEGORY_COLORS[d.category] || '#888';
  tooltip.innerHTML = `
    <div class="tooltip-title">${d.id}</div>
    <div class="tooltip-row"><span class="label">카테고리</span> <span style="color:${catColor}; font-weight:600;">${catLabel}</span></div>
    <div class="tooltip-row"><span class="label">총 언급</span> ${d.total}회</div>
    <div class="tooltip-row"><span class="label">원인↗</span> ${d.outW}회</div>
    <div class="tooltip-row"><span class="label">결과↙</span> ${d.inW}회</div>
  `;
  tooltip.classList.add('visible');
}

function showEdgeTooltip(event, d) {
  const cfg = REL_CONFIG[d.relationship] || {};
  tooltip.innerHTML = `
    <div class="tooltip-title">${d.source.id || d.source} ${cfg.symbol || '→'} ${d.target.id || d.target}</div>
    <div class="tooltip-row"><span class="label">관계</span>
      <span class="tooltip-rel" style="background:${cfg.color}22; color:${cfg.color}">${cfg.label || d.relationship}</span>
    </div>
    <div class="tooltip-row"><span class="label">빈도</span> ${d.frequency}회</div>
    <div class="tooltip-row"><span class="label">논문</span> ${d.num_papers}편</div>
    <div class="tooltip-row"><span class="label">신뢰도</span> ${d.confidence}</div>
    ${d.evidence ? `<div class="tooltip-row" style="margin-top:4px; padding-top:4px; border-top:1px solid var(--border);"><span style="color:var(--text-muted); font-size:11px; font-style:italic;">"${d.evidence.slice(0, 120)}"</span></div>` : ''}
  `;
  tooltip.classList.add('visible');
}

function moveTooltip(event) {
  const x = Math.min(event.clientX + 16, window.innerWidth - 380);
  const y = Math.min(event.clientY + 16, window.innerHeight - 200);
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

// ============================================================
// INIT — 레포 CSV 자동 로드, 실패 시 샘플 데이터 사용
// ============================================================
const CSV_URL = 'https://raw.githubusercontent.com/STARG-LEE/mab-causal-network/main/step2c_causal_edges_summary.csv';

async function init() {
  try {
    const response = await fetch(CSV_URL + '?t=' + Date.now());
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const text = await response.text();
    const parsed = parseCSV(text);

    if (parsed.length > 0) {
      rawData = parsed;
      document.getElementById('uploadLabel').innerHTML =
        `✅ 레포 CSV 로드 완료<br><small style="color:var(--text-muted)">${rawData.length}개 엣지 (다른 CSV 업로드 가능)</small>`;
    } else {
      throw new Error('파싱 결과 없음');
    }
  } catch (e) {
    console.log('레포 CSV 로드 실패, 샘플 데이터 사용:', e.message);
    rawData = [...SAMPLE_DATA];
    document.getElementById('uploadLabel').innerHTML =
      `📊 샘플 데이터 사용 중<br><small style="color:var(--text-muted)">CSV 업로드로 교체 가능</small>`;
  }

  // 슬라이더 범위 업데이트
  const maxF = Math.max(...rawData.map(d => d.frequency), 20);
  const maxP = Math.max(...rawData.map(d => d.num_papers), 20);
  document.getElementById('freqSlider').max = maxF;
  document.getElementById('paperSlider').max = maxP;
  document.getElementById('freqSlider').value = minFreq;
  document.getElementById('paperSlider').value = minPapers;
  document.getElementById('freqValue').textContent = `≥ ${minFreq}`;
  document.getElementById('paperValue').textContent = `≥ ${minPapers}`;

  buildRelFilters();
  updateGraph();
}

init();
</script>
